<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/></marker>
    <marker id="arrow-tool" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D6A05E"/></marker>
    <marker id="arrow-awaiting" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#BE8E73"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .stage { fill: #8A8175; font-size: 12px; font-weight: 700; text-anchor: middle; letter-spacing: 1px; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .request { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .tool { stroke: #D6A05E; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .awaiting { stroke: #BE8E73; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-request { fill: #5A86C8; }
      .label-tool { fill: #D6A05E; }
      .label-awaiting { fill: #BE8E73; }
    </style>
  </defs>

  <line class="lifeline" x1="100" y1="80" x2="100" y2="820" />
  <line class="lifeline" x1="1100" y1="80" x2="1100" y2="820" />
  <rect class="entity" x="20" y="40" width="160" height="40" />
  <text class="entity-text" x="100" y="65">Frontend</text>
  <rect class="entity" x="1020" y="40" width="160" height="40" />
  <text class="entity-text" x="1100" y="65">Agent Platform</text>
  <text class="stage" x="600" y="110">QUESTION</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 160 L100 160" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="152">[SSE] tool.start (工具开始，触发 question 流程)</text><text class="code" x="600" y="176">data: {"type":"tool.start","toolId":"tool_q_001","runId":"mnzmv40q","toolName":"collect_missing_info"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="awaiting" d="M1100 240 L100 240" marker-end="url(#arrow-awaiting)"/><text class="label label-awaiting" x="600" y="232">[SSE] awaiting.ask (question 项直接内联在等待事件里)</text><text class="code" x="600" y="256">data: {"type":"awaiting.ask","awaitingId":"await_001","runId":"mnzmv40q","mode":"question","questions":[{"id":"q1","question":"目标读者？"},{"id":"q2","question":"实现还是架构？"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 320 L100 320" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="312">[SSE] tool.args (等待问题已下发，工具参数继续流出)</text><text class="code" x="600" y="336">data: {"type":"tool.args","toolId":"tool_q_001","delta":"{\"topic\":\"AGW protocol\"}"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="2.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 400 L100 400" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="392">[SSE] tool.end (问题定义保持在同一条流里)</text><text class="code" x="600" y="416">data: {"type":"tool.end","toolId":"tool_q_001"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M100 480 L1100 480" marker-end="url(#arrow-request)"/><text class="label label-request" x="600" y="472">POST /api/submit (统一提交 runId + awaitingId + params[])</text><text class="code" x="600" y="496">{"runId":"mnzmv40q","awaitingId":"await_001","params":[{"id":"q1","answer":"前端工程师"},{"id":"q2","answer":"偏实现"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M1100 560 L100 560" marker-end="url(#arrow-request)"/><text class="label label-request" x="600" y="552">HTTP ack (提交成功接收)</text><text class="code" x="600" y="576">{"accepted":true,"status":"accepted","runId":"mnzmv40q","awaitingId":"await_001"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M1100 640 L100 640" marker-end="url(#arrow-request)" stroke-dasharray="6 4"/><text class="label label-request" x="600" y="632">[SSE] request.submit (原始 params[] 回到同一条 SSE 流)</text><text class="code" x="600" y="656">data: {"type":"request.submit","runId":"mnzmv40q","awaitingId":"await_001","params":[{"id":"q1","answer":"前端工程师"},{"id":"q2","answer":"偏实现"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="5.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="awaiting" d="M1100 720 L100 720" marker-end="url(#arrow-awaiting)"/><text class="label label-awaiting" x="600" y="712">[SSE] awaiting.answer (归一化结果写回)</text><text class="code" x="600" y="736">data: {"type":"awaiting.answer","runId":"mnzmv40q","awaitingId":"await_001","mode":"question","answers":[{"id":"q1","answer":"前端工程师"},{"id":"q2","answer":"偏实现"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="6.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 800 L100 800" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="792">[SSE] tool.result (question 分支继续在同一条 SSE 流中体现)</text><text class="code" x="600" y="816">data: {"type":"tool.result","toolId":"tool_q_001","result":"{\"ok\":true,\"status\":\"answered\"}"}</text></g>
</svg>
